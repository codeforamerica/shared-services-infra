#   build:
#     runs-on: ubuntu-latest
#     steps:
#       - uses: actions/checkout@v6
#       - name: Build
#         run: npm ci && npm run build   # replace with your build command
#       - uses: actions/upload-artifact@v8
#         with:
#           name: site
#           path: dist/                  # path to your build output
