name: Deploy static app

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to.
        default: development
        required: true
        type: environment

permissions:
  contents: read
  id-token: write

# Use this pattern if your site needs no build step (e.g. plain HTML, pre-built
# assets committed to the repo). The shared workflow checks out the repo and
# syncs the specified directory to S3.
jobs:
  deploy:
    uses: codeforamerica/shared-services-infra/.github/workflows/shared-deploy-static.yaml@main
    with:
      environment: ${{ inputs.environment || 'development' }}
      # source_dir: dist  # optional — defaults to repo root
    secrets: inherit
    # If your secret is named differently, map it explicitly instead of
    # using secrets: inherit:
    #
    # secrets:
    #   AWS_ROLE_ARN: ${{ secrets.AWS_STATIC_ROLE_ARN }}

# ──────────────────────────────────────────────────────────────────────────────
